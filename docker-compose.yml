version: '3.8'

services:
  app:
    build: .
    container_name: ws
    ports:
      - "8083:8083"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    mem_limit: 768m
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s