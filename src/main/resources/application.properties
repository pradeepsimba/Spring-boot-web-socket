server.port=${SERVER_PORT:8083}
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://host.docker.internal:5432/algo?sessionTimezone=Asia/Kolkata}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:ab45cd12}

# General-purpose pool: one-shot historical queries and live-feed bootstrap snapshots. The live
# feed itself (PostgresNotificationListener) uses its own separate pool - see livefeed.datasource.*
# below - so it no longer needs headroom reserved here.
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:15}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=${DB_POOL_CONNECTION_TIMEOUT_MS:30000}

# Bounds how long any single JdbcTemplate query may run - without this, an unbounded/slow query
# (see HistoricalDataQueryBuilder's LIMIT clauses) could otherwise hold a pooled connection forever.
spring.jdbc.template.query-timeout=${DB_QUERY_TIMEOUT_SECONDS:10}

# Live feed's own pool (see LiveFeedDataSourceConfig): one permanent LISTEN connection plus
# fetch-parallelism concurrent fetch workers, kept apart from the general pool above so a burst of
# client connects/reconnects can never starve the live feed of a connection, and vice versa.
livefeed.datasource.hikari.maximum-pool-size=${LIVEFEED_DB_POOL_SIZE:8}
livefeed.datasource.hikari.minimum-idle=${LIVEFEED_DB_POOL_MIN_IDLE:2}
# How many chunks of one NOTIFY batch PostgresNotificationListener may fetch from Postgres
# concurrently. Must stay below the pool size above (one slot is permanently reserved for the
# LISTEN connection itself).
livefeed.fetch-parallelism=${LIVEFEED_FETCH_PARALLELISM:4}

# Number of parallel lanes HistoricalDataWebSocketHandler uses to send to clients. Sending is
# I/O-bound (waiting on a client socket), not CPU-bound, so this is deliberately not tied to CPU
# core count - a higher value only costs idle threads, not CPU, and shrinks the fraction of
# sessions any one slow/stuck client can affect.
websocket.broadcast-parallelism=${WEBSOCKET_BROADCAST_PARALLELISM:16}

websocket.allowed-origins=${WEBSOCKET_ALLOWED_ORIGINS:*}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# Without graceful shutdown, a SIGTERM (docker stop, rolling deploy) can cut off in-flight
# WebSocket sends and the PG-notification listener mid-batch instead of letting PreDestroy hooks
# (PostgresNotificationListener.stop()) and open sessions wind down cleanly.
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s
